{% extends "base.html" %}

{% block title %}Settings - LiveKit Admin{% endblock %}

{% block content %}
<div class="grid grid-cols-1 gap-8">
    <!-- System Prompt Section -->
    <section class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-gray-800 flex items-center">
                    <i class="fas fa-comment-dots mr-2 text-indigo-500"></i>
                    System Prompt
                </h2>
                <div id="result" class="text-sm font-medium text-green-600 italic"></div>
            </div>
            <textarea 
                name="prompt" 
                rows="4" 
                class="w-full px-4 py-3 text-gray-700 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all duration-200 bg-gray-50"
            >{{ config.system_prompt }}</textarea>
            <div class="mt-4 flex justify-end">
                <button hx-post="/prompt" hx-include="[name='prompt']" hx-target="#result" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition-colors">Save Prompt</button>
            </div>
        </div>
    </section>

    <!-- LiveKit Config Section -->
    <section class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="p-6">
            <h2 class="text-xl font-bold text-gray-800 flex items-center mb-6">
                <i class="fas fa-cogs mr-2 text-indigo-500"></i>
                LiveKit Server Configuration
            </h2>
            <div id="lk-result" class="mb-4 text-sm text-green-600"></div>
            <form hx-post="/settings/livekit" hx-target="#lk-result" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Server URL</label>
                        <input type="text" name="url" value="{{ config.livekit_url }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">API Key</label>
                        <input type="text" name="key" value="{{ config.livekit_api_key }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">API Secret</label>
                    <input type="password" name="secret" value="{{ config.livekit_api_secret }}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition-colors">Update Configuration</button>
                </div>
            </form>
        </div>
    </section>
</div>
{% endblock %}
