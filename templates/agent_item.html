<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition-shadow">
    <div class="flex items-center">
        <div class="bg-indigo-100 p-3 rounded-lg mr-4">
            <i class="fas fa-robot text-indigo-600 text-xl"></i>
        </div>
        <div>
            <h3 class="font-bold text-gray-900 text-lg">{{ agent.name }}</h3>
            <p class="text-gray-500 text-sm">{{ agent.type|capitalize }} Agent • {{ agent.description }}</p>
        </div>
    </div>
    <div class="flex items-center space-x-2">
        <button 
            hx-get="/agents/{{ agent.id }}/test" 
            hx-target="#test-area"
            class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" 
            title="Test Agent"
        >
            <i class="fas fa-vial"></i>
        </button>
        <button 
            hx-delete="/agents/{{ agent.id }}" 
            hx-target="closest div" 
            hx-swap="outerHTML swap:1s"
            class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors" 
            title="Delete Agent"
        >
            <i class="fas fa-trash"></i>
        </button>
    </div>
</div>
