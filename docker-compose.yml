services:
  api:
    build: .
    container_name: livekit-admin
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./.db/livekit_admin.db}
    volumes:
      - .db:/app/.db
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s