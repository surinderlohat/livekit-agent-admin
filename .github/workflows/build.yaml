name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build --pull -t livekit-agent-management .

      - name: Run container
        run: |
          docker run -d \
            -p 8000:8000 \
            -e PORT=8000 \
            --name test-app \
            livekit-agent-management

      - name: Wait for container to start
        run: sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Stop container
        run: docker stop test-app